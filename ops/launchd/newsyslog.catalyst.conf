# CATALYST / lab-scheduler — newsyslog rotation for the LaunchAgent stdout sink.
#
# Install target: /etc/newsyslog.d/catalyst.conf
# Installed by:   scripts/install_launchd.sh (prints the sudo cp command;
#                 never runs it itself — the operator runs installs manually)
#
# macOS ships newsyslog(8) as a periodic LaunchDaemon that runs hourly via
# com.apple.newsyslog. Anything under /etc/newsyslog.d/ is picked up with no
# extra daemon, cron job, or Python dependency — the whole point of Option A
# in the design discussion.
#
# Why two lines: the service runs on either the Mac mini (user `vishwajeet`,
# working copy at ~/Scheduler/Main) or the laptop (user `vishvajeetn`, working
# copy at ~/Documents/Scheduler/Main). One host will not match the other
# pattern; newsyslog silently ignores missing files, so shipping both lines
# on both machines is safe.
#
# Field reference (newsyslog.conf(5)):
#   logfile_name            owner:group   mode   count   size(KB)   when   flags
#
# Policy:
#   * Rotate when the file crosses 10 MB (size = 10240 KB).
#   * Keep 7 rotated archives — older ones are discarded.
#   * `Z` → gzip compress rotated files (server.log.0.gz, .1.gz, …).
#   * `N` → no process to signal on rotation. CATALYST has no pidfile and the
#           launchd service owns its own stdio FDs, so sending SIGHUP would
#           go nowhere useful. See DEPLOY.md §2 for the known launchd FD
#           gotcha and the `launchctl kickstart` remediation.
#   * `*` in the `when` column → size-driven only, never time-driven.
#
# logfile_name                                            owner:group        mode count size   when flags
/Users/vishwajeet/Scheduler/Main/logs/server.log          vishwajeet:staff   644  7     10240  *    NZ
/Users/vishvajeetn/Documents/Scheduler/Main/logs/server.log vishvajeetn:staff 644  7     10240  *    NZ
