<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>PRISM Letterhead</title>
<style>
@page { size: A4; margin: 0; }
body { font-family: -apple-system, Helvetica, Arial, sans-serif; margin: 0; padding: 0; color: #1a1a1a; }
.page { width: 210mm; min-height: 297mm; padding: 20mm 25mm; box-sizing: border-box; position: relative; }
.header { display: flex; align-items: center; gap: 16px; padding-bottom: 16px; border-bottom: 3px solid #2d6a9f; }
.logo { width: 48px; height: 48px; }
.org-name { font-size: 24px; font-weight: 800; color: #1a3a5c; letter-spacing: -0.5px; }
.org-tagline { font-size: 11px; color: #666; letter-spacing: 1px; text-transform: uppercase; }
.content { padding-top: 30mm; min-height: 200mm; font-size: 12px; line-height: 1.6; }
.footer { position: absolute; bottom: 15mm; left: 25mm; right: 25mm; border-top: 1px solid #ddd; padding-top: 8px; font-size: 9px; color: #999; display: flex; justify-content: space-between; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <img src="logo.svg" class="logo" alt="PRISM">
    <div>
      <div class="org-name">PRISM</div>
      <div class="org-tagline">Central Research Facility · Instrument Management System</div>
    </div>
  </div>
  <div class="content">
    <!-- Letter content here -->
  </div>
  <div class="footer">
    <span>PRISM ERP · Confidential</span>
    <span>https://github.com/nvishvajeet/prism-erp</span>
  </div>
</div>
</body>
</html>
