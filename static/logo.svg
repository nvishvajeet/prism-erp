<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0f1419"/>
  
  <!-- Prism triangle — the core symbol -->
  <polygon points="256,80 420,400 92,400" fill="none" stroke="#4a7a9e" stroke-width="24" stroke-linejoin="round"/>
  
  <!-- Light beam entering -->
  <line x1="60" y1="220" x2="200" y2="280" stroke="#7fd1d4" stroke-width="8" stroke-linecap="round"/>
  
  <!-- Spectrum rays exiting (5 colors) -->
  <line x1="340" y1="240" x2="460" y2="160" stroke="#e85454" stroke-width="6" stroke-linecap="round"/>
  <line x1="345" y1="260" x2="460" y2="220" stroke="#e8a534" stroke-width="6" stroke-linecap="round"/>
  <line x1="348" y1="280" x2="460" y2="280" stroke="#5ec46a" stroke-width="6" stroke-linecap="round"/>
  <line x1="345" y1="300" x2="460" y2="340" stroke="#4a9ee8" stroke-width="6" stroke-linecap="round"/>
  <line x1="340" y1="320" x2="460" y2="400" stroke="#8b6fd4" stroke-width="6" stroke-linecap="round"/>
  
  <!-- V monogram in center -->
  <text x="256" y="320" text-anchor="middle" font-family="ui-sans-serif,-apple-system,Helvetica,Arial" font-size="140" font-weight="700" fill="#ffffff" letter-spacing="-8">V</text>
</svg>
