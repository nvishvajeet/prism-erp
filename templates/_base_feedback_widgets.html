  {# ── Universal Feedback Button — all users ── #}
  {% if current_user %}
  <div id="feedbackWidget" class="feedback-widget" data-vis="{{ V }}">
    <button id="feedbackToggle" class="feedback-toggle" title="Report issue or request" data-vis="{{ V }}">💬</button>
    <div id="feedbackPanel" class="feedback-panel" hidden data-vis="{{ V }}">
      <div class="feedback-header" data-vis="{{ V }}">
        <strong data-vis="{{ V }}">Quick Feedback</strong>
        <button id="feedbackClose" class="feedback-close" data-vis="{{ V }}">✕</button>
      </div>
      <form method="post" action="{{ url_for('quick_entry') }}" class="feedback-form" data-vis="{{ V }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <input type="hidden" name="source" value="feedback">
        <textarea name="text" id="feedbackText" rows="3" placeholder="Type or speak your request..." data-vis="{{ V }}"></textarea>
        <div class="feedback-actions" data-vis="{{ V }}">
          <button type="button" id="feedbackMic" class="btn" data-vis="{{ V }}">🎤</button>
          <button type="submit" class="btn btn-primary" data-vis="{{ V }}">Send</button>
        </div>
      </form>
      <p class="hint feedback-hint" data-vis="{{ V }}">Chrome recommended for voice. Works on all browsers for text.</p>
    </div>
  </div>
  <script>
  (function(){
    var toggle = document.getElementById('feedbackToggle');
    var panel = document.getElementById('feedbackPanel');
    var close = document.getElementById('feedbackClose');
    if (!toggle) return;
    toggle.addEventListener('click', function(){ panel.hidden = !panel.hidden; });
    close.addEventListener('click', function(){ panel.hidden = true; });

    // Voice
    var SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    var mic = document.getElementById('feedbackMic');
    var text = document.getElementById('feedbackText');
    if (SpeechRecognition && mic) {
      var recognition = new SpeechRecognition();
      recognition.continuous = false; recognition.interimResults = false; recognition.lang = 'en-US';
      var listening = false;
      mic.addEventListener('click', function(){
        if (listening) { recognition.stop(); return; }
        recognition.start(); listening = true; mic.textContent = '🔴';
      });
      recognition.onresult = function(e){ text.value += e.results[0][0].transcript; mic.textContent = '🎤'; listening = false; };
      recognition.onend = function(){ mic.textContent = '🎤'; listening = false; };
    } else if (mic) {
      mic.title = 'Voice requires Chrome'; mic.style.opacity = '0.4';
    }
  })();
  </script>
  {# ── AI Form Assistant — floating button on pages with forms ── #}
  <div id="aiAssistWidget" class="feedback-widget" style="bottom:5rem;" data-vis="{{ V }}">
    <button id="aiAssistToggle" class="feedback-toggle" title="AI Form Assistant" style="background:var(--accent-primary);color:var(--bg, #fff);" data-vis="{{ V }}">✨</button>
    <div id="aiAssistPanel" class="feedback-panel" hidden data-vis="{{ V }}">
      <div class="feedback-header" data-vis="{{ V }}">
        <strong data-vis="{{ V }}">✨ AI Assistant</strong>
        <button id="aiAssistClose" class="feedback-close" data-vis="{{ V }}">✕</button>
      </div>
      <div style="padding:0.5rem;" data-vis="{{ V }}">
        <textarea id="aiAssistInput" rows="3" style="width:100%;resize:vertical;padding:0.5rem;border:1px solid var(--border);border-radius:6px;background:var(--bg-primary);color:var(--text-primary);" placeholder="Describe what you want in plain English..." data-vis="{{ V }}"></textarea>
        <div style="display:flex;gap:0.5rem;margin-top:0.5rem;" data-vis="{{ V }}">
          <button type="button" id="aiAssistRun" class="btn btn-primary" data-vis="{{ V }}">Fill Form</button>
          <span id="aiAssistStatus" class="hint" data-vis="{{ V }}"></span>
        </div>
      </div>
      <p class="hint feedback-hint" data-vis="{{ V }}">AI fills the form — you review and submit normally.</p>
    </div>
  </div>
  <script>
  (function(){
    var widget = document.getElementById('aiAssistWidget');
    var toggle = document.getElementById('aiAssistToggle');
    var panel = document.getElementById('aiAssistPanel');
    var close = document.getElementById('aiAssistClose');
    var input = document.getElementById('aiAssistInput');
    var runBtn = document.getElementById('aiAssistRun');
    var status = document.getElementById('aiAssistStatus');
    // Only show on pages with forms
    var forms = document.querySelectorAll('form:not(.feedback-form):not([action*="logout"])');
    if (!forms.length) { widget.style.display = 'none'; return; }
    toggle.addEventListener('click', function(){ panel.hidden = !panel.hidden; if(!panel.hidden) input.focus(); });
    close.addEventListener('click', function(){ panel.hidden = true; });
    runBtn.addEventListener('click', function(){
      var text = input.value.trim();
      if (!text) return;
      status.textContent = 'Analyzing...';
      runBtn.disabled = true;
      // Scan form fields
      var form = forms[0];
      var fields = [];
      form.querySelectorAll('input,select,textarea').forEach(function(el){
        if (el.type === 'hidden' || el.type === 'submit' || !el.name) return;
        var label = '';
        var lbl = form.querySelector('label[for="'+el.id+'"]') || el.closest('label');
        if (lbl) label = lbl.textContent.trim().split('\n')[0].substring(0,50);
        var opts = [];
        if (el.tagName === 'SELECT') {
          el.querySelectorAll('option').forEach(function(o){ if(o.value) opts.push({v:o.value,t:o.textContent.trim()}); });
        }
        fields.push({name:el.name, type:el.type||el.tagName.toLowerCase(), label:label, options:opts.slice(0,20)});
      });
      var page = document.title || window.location.pathname;
      fetch('/api/ai-fill', {
        method:'POST',
        headers:{'Content-Type':'application/json','X-CSRFToken':'{{ csrf_token() }}'},
        body:JSON.stringify({page:page, fields:fields, text:text})
      }).then(function(r){return r.json();}).then(function(data){
        var filled = 0;
        Object.keys(data).forEach(function(k){
          var el = form.querySelector('[name="'+k+'"]');
          if (!el) return;
          if (el.tagName === 'SELECT') {
            for(var i=0;i<el.options.length;i++){
              if(el.options[i].value==data[k]||el.options[i].text.toLowerCase().indexOf(String(data[k]).toLowerCase())>=0){
                el.selectedIndex=i; filled++; break;
              }
            }
          } else if (el.type === 'checkbox') {
            el.checked = !!data[k]; filled++;
          } else {
            el.value = data[k]; filled++;
          }
          el.style.outline = '2px solid var(--accent-primary)';
          setTimeout(function(){el.style.outline='';},3000);
        });
        status.textContent = filled + ' field(s) filled';
        runBtn.disabled = false;
      }).catch(function(){
        status.textContent = 'AI unavailable — fill manually';
        runBtn.disabled = false;
      });
    });
  })();
  </script>
  {% endif %}
