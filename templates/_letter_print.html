<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>{{ letter.title }}</title>
<style>
@page { size: A4; margin: 20mm 25mm; }
@media print { body { -webkit-print-color-adjust: exact; } }
body { font-family: -apple-system, Helvetica, Arial; font-size: 12px; line-height: 1.6; color: #1a1a1a; margin: 0; padding: 20mm 25mm; }
.header { display: flex; align-items: center; gap: 16px; padding-bottom: 16px; border-bottom: 3px solid #2d6a9f; margin-bottom: 30px; }
.logo { width: 48px; }
.org-name { font-size: 22px; font-weight: 800; color: #1a3a5c; }
.org-tagline { font-size: 10px; color: #666; text-transform: uppercase; letter-spacing: 1px; }
.date { text-align: right; margin-bottom: 20px; color: #666; }
.recipient { margin-bottom: 20px; }
.subject { font-weight: 700; margin-bottom: 20px; }
.body { white-space: pre-wrap; }
.signature { margin-top: 60px; }
.footer { position: fixed; bottom: 15mm; left: 25mm; right: 25mm; border-top: 1px solid #ddd; padding-top: 8px; font-size: 9px; color: #999; }
</style>
</head>
<body>
<div class="header">
  <img src="/static/logo.svg" class="logo">
  <div>
    <div class="org-name">{{ org_name }}</div>
    <div class="org-tagline">{{ org_tagline }}</div>
  </div>
</div>
<div class="date">Date: {{ letter.created_at[:10] }}</div>
<div class="recipient"><strong>To:</strong> {{ letter.recipient }}</div>
<div class="subject"><strong>Subject:</strong> {{ letter.title }}</div>
<div class="body">{{ letter.body }}</div>
<div class="signature">
  <br><br>
  {{ author_name }}<br>
  <small>{{ org_name }}</small>
</div>
<div class="footer">{{ org_name }} &middot; Confidential</div>
</body>
</html>
