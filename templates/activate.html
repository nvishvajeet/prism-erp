{% extends "base.html" %}
{% from "_page_macros.html" import card_heading with context %}
{% block content %}
<div class="activate-tiles" data-vis="requester">
  <section class="card tile tile-form tile-activate" data-vis="requester">
    {{ card_heading("", "Activate Invited Account") }}
    <form method="post" class="form-grid" data-vis="requester">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" data-vis="requester">
      <label data-vis="requester">Email
        <input type="email" name="email" required data-vis="requester">
      </label>
      <label data-vis="requester">Name
        <input type="text" name="name" placeholder="Optional display name update" data-vis="requester">
      </label>
      <label data-vis="requester">New Password
        <input type="password" name="password" minlength="8" required placeholder="At least 8 characters" data-vis="requester">
      </label>
      <button type="submit" class="primary-action" data-vis="requester">Activate Account</button>
    </form>
  </section>
</div>
{% endblock %}
