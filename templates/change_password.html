{% extends "base.html" %}
{% block content %}
<section class="card narrow" data-vis="requester">
  <h2 data-vis="requester">Change Password</h2>
  <form method="post" class="form-grid" data-vis="requester">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" data-vis="requester">
    <label data-vis="requester">Current Password
      <input type="password" name="current_password" required data-vis="requester">
    </label>
    <label data-vis="requester">New Password
      <input type="password" name="new_password" minlength="8" required data-vis="requester">
    </label>
    <label data-vis="requester">Confirm New Password
      <input type="password" name="confirm_password" minlength="8" required data-vis="requester">
    </label>
    <button type="submit" data-vis="requester">Change Password</button>
  </form>
  <p class="form-hint" data-vis="requester">Minimum 8 characters.</p>
</section>
{% endblock %}
