{% extends "base.html" %}
{% block content %}
<div class="login-page" data-vis="all">
<section class="card narrow login-card" data-vis="all">
  <div class="login-brand" data-vis="all">
    <span class="login-brand-name">{{ org_name }}</span>
  </div>
  <h2 data-vis="all">Forgot password</h2>
  <p class="hint" data-vis="all">
    Enter the username or email you use to sign in. An admin will
    generate a new temporary password and share it with you directly.
    No self-reset email — every reset is mediated.
  </p>
  <form method="post" class="form-grid" data-vis="all">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" data-vis="all">
    <label data-vis="all">Username or email
      <input type="text" name="email" required autocapitalize="off"
             autocomplete="username" spellcheck="false"
             placeholder="Username" data-vis="all">
    </label>
    <button type="submit" data-vis="all">Request password reset</button>
  </form>
  <p class="form-hint" data-vis="all">
    <a class="text-link" href="{{ url_for('login') }}">← Back to sign-in</a>
  </p>
</section>
</div>
{% endblock %}
