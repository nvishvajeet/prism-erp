{% extends "base.html" %}
{% block content %}
<section class="card narrow">
  <h2>Sign In</h2>
  <form method="post" class="form-grid">
    <label>Email
      <input type="email" name="email" required>
    </label>
    <label>Password
      <input type="password" name="password" required>
    </label>
    <button type="submit">Login</button>
  </form>
</section>
{% endblock %}
