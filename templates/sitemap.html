{% extends "base.html" %}
{% from "_page_macros.html" import page_intro %}
{% block content %}
{% call page_intro("", "Site Map") %}{% endcall %}
<section class="grid-two sitemap-grid" data-vis="{{ V }}">
  {% for section in sections %}
  <div class="card" data-vis="{{ V }}">
    <h2 data-vis="{{ V }}">{{ section.title }}</h2>
    <div class="sitemap-list" data-vis="{{ V }}">
      {% for link in section.links %}
      <a class="sitemap-link" href="{{ link.href }}" data-vis="{{ V }}">{{ link.label }}</a>
      {% endfor %}
    </div>
  </div>
  {% endfor %}
</section>
{% endblock %}
